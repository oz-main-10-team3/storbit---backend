version: '3.8'

services:
  django:
    container_name: django
    env_file:
      - envs/.local.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    build:
      context: .
    working_dir: /storbit
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --workers 3 --worker-class=uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 config.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/storbit/app/static
      - media_volume:/storbit/app/media
    networks:
      - ws
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Django가 정상적으로 HTTP 응답을 하는지 확인
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      django:
        condition: service_healthy # django가 정상적으로 작동할 때까지 기다림
    volumes:
      - ./resources/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/storbit/app/static
      - media_volume:/storbit/app/media
    networks:
      - ws

  db:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pw1234
      POSTGRES_ROOT_USER: postgres
      POSTGRES_DB: storbit
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ws
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ws
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  ws:
    driver: bridge

volumes:
  static_volume:
  media_volume:
  postgres_data:
